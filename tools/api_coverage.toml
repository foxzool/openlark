# feature-crate → bizTag 映射（单一真相）
#
# 目的：
# - 给 tools/validate_apis.py 提供 --crate 的自动补全（src + filter）
# - 给 typed coverage 专题 dashboard 提供 crate 分组元数据
# - 给 .claude/skills/openlark-api/ 提供一致的"选 crate 口径"
#
# 约定：
# - key 使用 workspace crate/package 名（例如 openlark-docs）
# - biz_tags 使用 CSV 的 bizTag 原值（区分大小写，通常为小写）
# - dashboard_groups 可选；当前 `core_business` 对齐 Cargo.toml 中 essential + enterprise 的业务 crate（排除 auth 基础设施）

[crates.openlark-docs]
src = "crates/openlark-docs/src"
biz_tags = ["ccm", "base", "baike", "minutes"]
dashboard_groups = ["core_business"]

[crates.openlark-meeting]
src = "crates/openlark-meeting/src"
biz_tags = ["calendar", "vc", "meeting_room"]

[crates.openlark-communication]
src = "crates/openlark-communication/src"
biz_tags = ["im", "contact", "moments", "aily", "event"]
dashboard_groups = ["core_business"]

[crates.openlark-cardkit]
src = "crates/openlark-cardkit/src"
biz_tags = ["cardkit"]

[crates.openlark-bot]
src = "crates/openlark-bot/src"
biz_tags = ["bot"]

[crates.openlark-hr]
src = "crates/openlark-hr/src"
biz_tags = [
  "hire",
  "feishu_people",
  "attendance",
  "compensation_management",
  "performance",
  "payroll",
  "okr",
  "ehr",
]
dashboard_groups = ["core_business"]

[crates.openlark-security]
src = "crates/openlark-security/src"
biz_tags = ["acs", "security_and_compliance"]
dashboard_groups = ["core_business"]
implementation_path_rewrites = [
  { from = "security_and_compliance/security_and_compliance/v1/multi_geo_entity/", to = "security/security_and_compliance/v1/multi_geo_entity/" },
  { from = "security_and_compliance/security_and_compliance/v1/openapi_log/", to = "security/security_and_compliance/v1/openapi_logs/" },
  { from = "security_and_compliance/security_and_compliance/v1/user_migration/", to = "security/security_and_compliance/v1/user_migrations/" },
  { from = "security_and_compliance/security_and_compliance/v2/device_record/", to = "security/security_and_compliance/v2/device_records/" },
]

[crates.openlark-security.implementation_path_aliases]
"security_and_compliance/security_and_compliance/v2/device_apply_record/update.rs" = "security/security_and_compliance/v2/device_apply_records/approve.rs"

[crates.openlark-ai]
src = "crates/openlark-ai/src"
biz_tags = ["ai"]

[crates.openlark-auth]
src = "crates/openlark-auth/src"
biz_tags = ["auth", "passport", "verification_information", "human_authentication"]

[crates.openlark-platform]
src = "crates/openlark-platform/src"
biz_tags = ["admin", "directory", "app_engine", "trust_party", "tenant", "mdm", "spark"]

[crates.openlark-workflow]
src = "crates/openlark-workflow/src"
biz_tags = ["task", "approval", "board"]
dashboard_groups = ["core_business"]
implementation_path_rewrites = [
  { from = "task/task/", to = "" },
]

[crates.openlark-workflow.implementation_path_aliases]
"task/task/v1/task/batch_delete_collaborator.rs" = "v1/task/collaborator/batch_delete.rs"
"task/task/v1/task/batch_delete_follower.rs" = "v1/task/follower/batch_delete.rs"
"task/task/v2/comment/patch.rs" = "v2/comment/update.rs"
"task/task/v2/custom_field/patch.rs" = "v2/custom_field/update.rs"

[crates.openlark-analytics]
src = "crates/openlark-analytics/src"
biz_tags = ["search", "report"]

[crates.openlark-user]
src = "crates/openlark-user/src"
biz_tags = ["personal_settings"]

[crates.openlark-mail]
src = "crates/openlark-mail/src"
biz_tags = ["mail"]

[crates.openlark-helpdesk]
src = "crates/openlark-helpdesk/src"
biz_tags = ["helpdesk"]

[crates.openlark-application]
src = "crates/openlark-application/src"
biz_tags = ["application", "workplace"]
